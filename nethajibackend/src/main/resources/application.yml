server:
  port: ${PORT:9029}

spring:
  application:
    name: NETHAJI-SERVICE
  config:
    import: optional:configserver:http://localhost:8888
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: never
      data-locations: classpath:data.sql
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/nethaji}
    username: ${SPRING_DATASOURCE_USERNAME:nethaji_user}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

twoFactor:
  host: https://2factor.in/API/V1/
  apiKey: ${TWO_FACTOR_API_KEY:}
  verifyPath: /SMS/VERIFY
  templateName: OTPXYRICE
  esignTemplateName: eSign-OTP
  uploadExceptionMessage: can not upload a verified document

bucketName: hireingdishabucket

app:
  auth:
    tokenSecret: ${APP_AUTH_TOKEN_SECRET:dev-secret-change-me}
    tokenExpirationMSec: 864000000
    refreshTokenExpiration: 1800000

aws:
  accesskey: ${AWS_ACCESS_KEY_ID:}
  secretkey: ${AWS_SECRET_ACCESS_KEY:}

messaging:
  email:
    from: nethajidc@gmail.com
    region: ap-south-2
